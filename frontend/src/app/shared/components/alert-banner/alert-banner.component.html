<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 w-96">
  @for (alert of alerts(); track alert.id) {
    <div class="flex items-start justify-between gap-3 rounded-lg border border-red-500/40 bg-slate-900/95 px-4 py-3 shadow-lg backdrop-blur animate-slide-in">
      <div>
        <p class="text-xs font-semibold tracking-widest text-red-400 uppercase">⚠ High Risk Alert</p>
        <p class="mt-1 text-sm text-slate-200">
          <span class="font-mono text-red-300">{{ alert.source_ip }}</span>
          — Risk Score: <span class="font-bold text-red-400">{{ alert.risk_score }}</span>
        </p>
        <p class="mt-0.5 text-xs text-slate-400">{{ alert.request_path }} · {{ alert.primary_vector }}</p>
      </div>
      <button (click)="dismiss(alert.id)" class="mt-0.5 text-slate-500 hover:text-slate-200 text-lg leading-none">×</button>
    </div>
  }
</div>
