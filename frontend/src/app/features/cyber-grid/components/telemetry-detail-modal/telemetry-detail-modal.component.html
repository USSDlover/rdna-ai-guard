@if (event(); as selectedEvent) {
  <div
    class="modal-backdrop fixed inset-0 z-50 flex items-center justify-center bg-slate-950/85 p-4 backdrop-blur-sm"
    role="presentation"
    (click)="onBackdropClick($event)"
  >
    <section
      class="modal-panel flex max-h-[min(90vh,52rem)] w-full max-w-3xl flex-col overflow-hidden rounded-2xl border border-slate-700 bg-slate-900 shadow-[0_0_60px_rgba(239,68,68,0.12)]"
      role="dialog"
      aria-modal="true"
      aria-labelledby="telemetry-detail-title"
    >
      <header
        class="flex items-start justify-between gap-4 border-b border-slate-800 px-6 py-4"
      >
        <div class="min-w-0 space-y-1">
          <p class="text-xs font-semibold tracking-[0.2em] text-cyan-400 uppercase">
            Packet Inspection
          </p>
          <h2 id="telemetry-detail-title" class="truncate text-lg font-semibold text-slate-100">
            Telemetry Event {{ selectedEvent.id }}
          </h2>
          <p class="text-sm text-slate-400">
            Source
            <span class="font-mono text-slate-200">{{ selectedEvent.source_ip }}</span>
            · Status
            <span class="font-semibold" [class]="statusTone()">{{ selectedEvent.status }}</span>
          </p>
        </div>

        <button
          type="button"
          class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-lg border border-slate-700 bg-slate-800 text-xl leading-none text-slate-300 transition-colors hover:border-red-500/60 hover:bg-red-950/40 hover:text-white"
          aria-label="Close telemetry detail modal"
          (click)="close()"
        >
          ×
        </button>
      </header>

      <div class="min-h-0 flex-1 overflow-auto px-6 py-4">
        <p class="mb-3 text-xs font-medium tracking-wide text-slate-500 uppercase">
          Full JSON Configuration Packet
        </p>
        <pre
          class="json-view overflow-x-auto rounded-xl border border-slate-800 bg-slate-950 p-4 text-sm leading-relaxed text-slate-200"
        ><code [innerHTML]="highlightedJson()"></code></pre>
      </div>

      <footer class="flex justify-end border-t border-slate-800 px-6 py-4">
        <button
          type="button"
          class="rounded-lg border border-slate-600 bg-slate-800 px-5 py-2.5 text-sm font-semibold text-slate-100 transition-colors hover:border-slate-500 hover:bg-slate-700"
          (click)="close()"
        >
          Dismiss
        </button>
      </footer>
    </section>
  </div>
}
