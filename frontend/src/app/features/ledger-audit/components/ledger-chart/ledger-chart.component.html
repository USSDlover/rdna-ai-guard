@if (!hasData()) {
  <div
    class="flex h-64 items-center justify-center rounded-xl border border-dashed border-amber-500/20 bg-slate-950/60 text-sm text-slate-500"
  >
    Awaiting fraud-classified telemetry for velocity plotting…
  </div>
} @else if (chart(); as model) {
  <div class="relative w-full overflow-hidden rounded-xl border border-amber-500/20 bg-slate-950/80">
    <svg
      class="h-auto w-full"
      [attr.viewBox]="'0 0 ' + model.width + ' ' + model.height"
      preserveAspectRatio="xMidYMid meet"
      role="img"
      aria-label="Transaction amount velocity chart"
    >
      <defs>
        <linearGradient id="ledger-area-gradient" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="rgb(245 158 11 / 0.35)" />
          <stop offset="100%" stop-color="rgb(245 158 11 / 0.02)" />
        </linearGradient>
        <filter id="spike-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>

      @for (tick of model.yTicks; track tick.label) {
        <line
          [attr.x1]="56"
          [attr.x2]="model.width - 24"
          [attr.y1]="tick.y"
          [attr.y2]="tick.y"
          stroke="rgb(51 65 85 / 0.55)"
          stroke-dasharray="4 6"
        />
        <text
          [attr.x]="48"
          [attr.y]="tick.y + 4"
          text-anchor="end"
          class="fill-slate-500 text-[10px]"
        >
          {{ tick.label }}
        </text>
      }

      <path [attr.d]="model.areaPath" fill="url(#ledger-area-gradient)" />
      <path
        [attr.d]="model.linePath"
        fill="none"
        stroke="rgb(251 191 36)"
        stroke-width="2.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      />

      @for (point of model.points; track point.event.id) {
        @if (point.isSpike) {
          <circle
            [attr.cx]="point.x"
            [attr.cy]="point.y"
            r="7"
            fill="rgb(220 38 38 / 0.25)"
            filter="url(#spike-glow)"
          />
          <circle
            [attr.cx]="point.x"
            [attr.cy]="point.y"
            r="4.5"
            fill="rgb(239 68 68)"
            stroke="rgb(251 191 36)"
            stroke-width="1.5"
          />
        } @else {
          <circle
            [attr.cx]="point.x"
            [attr.cy]="point.y"
            r="3"
            fill="rgb(251 191 36 / 0.85)"
            stroke="rgb(15 23 42)"
            stroke-width="1"
          />
        }
      }

      @for (label of model.xLabels; track label.label) {
        <text
          [attr.x]="label.x"
          [attr.y]="model.height - 12"
          text-anchor="middle"
          class="fill-slate-500 text-[10px]"
        >
          {{ label.label }}
        </text>
      }
    </svg>

    <div
      class="absolute top-3 right-3 rounded-full border border-amber-500/30 bg-slate-900/90 px-3 py-1 text-[10px] font-medium tracking-wide text-amber-300 uppercase"
    >
      Spike threshold &gt; $10,000
    </div>
  </div>
}
