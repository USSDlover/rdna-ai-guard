services:
  postgres:
    image: postgres:16-alpine
    container_name: rdna-guard-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: guard_password
      POSTGRES_DB: rdna_guard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rdna_guard"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rdna-network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: rdna-guard-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rdna-network
    restart: unless-stopped

  ollama-pull:
    image: curlimages/curl:latest
    container_name: rdna-guard-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - rdna-network
    entrypoint: >
      /bin/sh -c "
      echo '⏳ Initiating Ollama pull for model gemma4:12b...';
      curl -X POST http://ollama:11434/api/pull -H 'Content-Type: application/json' -d '{\"name\": \"gemma4:12b\", \"stream\": false}';
      echo '\n✅ Model pull queued successfully!';
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rdna-guard-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:guard_password@postgres:5432/rdna_guard
      OLLAMA_HOST: http://ollama:11434
      GEMMA_MODEL: gemma4:12b
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - rdna-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rdna-guard-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - rdna-network
    restart: unless-stopped

volumes:
  pgdata:
    name: rdna-pgdata
  ollama_data:
    name: rdna-ollama-data

networks:
  rdna-network:
    driver: bridge
    name: rdna-network